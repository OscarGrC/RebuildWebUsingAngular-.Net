<header class="app-header">
    <!-- Logo -->
    <div class="app-header__logo-container">
        <img src="logo.png" alt="Logo Empresa" class="app-header__logo" />
    </div>

    <!-- Menú Principal -->
    <p-menubar [model]="menuItems" class="app-header__main-menu"></p-menubar>

    <!-- Menú de Accesibilidad -->
    <p-menu [model]="accessibilityItems" class="app-header__accessibility-menu"></p-menu>

    <!-- Botón Hamburguesa (solo en móvil) -->
    <button (click)="toggleMenu()" class="app-header__hamburger-menu" *ngIf="isMobile">
        <i class="pi pi-bars"></i>
    </button>
</header>
